<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#efefef;
font-family:Georgia, serif;
}

.btn{
display:inline-block;
width:118px;          /* very tiny */
height:24px;          /* very tiny */
line-height:24px;
text-align:center;
background:#2f6fc0;
color:#fff;
text-decoration:none;
font-size:10px;       /* tiny text */
border-radius:4px;
border:none;
outline:none;
cursor:pointer;
user-select:none;
}

/* absolutely no hover / click change */
.btn:hover,
.btn:active,
.btn:focus,
.btn:visited{
background:#2f6fc0;
color:#fff;
transform:none;
box-shadow:none;
outline:none;
}
</style>
</head>

<body>

<a class="btn"
href="https://drive.google.com/file/d/1FwELaNAMR_X1gWVPH7Gm-H0EGY4YoCGH/preview"
target="_blank">
Course Certificate
</a>

</body>
</html>
