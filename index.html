<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#efefef;
font-family:Georgia, serif;
}

.btn{
display:inline-block;
width:88px;           
height:18px;          
line-height:18px;
text-align:center;
background:#2f6fc0;
color:#fff;
text-decoration:none;
font-size:7px;        
border-radius:3px;
border:none;
outline:none;
cursor:pointer;
user-select:none;
}

/* no hover / click / focus change */
.btn:hover,
.btn:active,
.btn:focus,
.btn:visited{
background:#2f6fc0;
color:#fff;
transform:none;
box-shadow:none;
outline:none;
}
</style>
</head>

<body>

<a class="btn"
href="certificate.pdf"
target="_blank">
Course Certificate
</a>

</body>
</html>
