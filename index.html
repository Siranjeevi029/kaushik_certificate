<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#efefef;
font-family: Georgia, serif;
}

.btn{
display:inline-block;
width:210px;
height:42px;
line-height:42px;
text-align:center;
background:#2f6fc0;
color:white;
text-decoration:none;
font-size:16px;
border-radius:7px;
cursor:pointer;
user-select:none;
}

/* no hover effect */
.btn:hover{
background:#2f6fc0;
color:white;
transform:none;
}

/* no click effect */
.btn:active{
background:#2f6fc0;
color:white;
transform:none;
outline:none;
}

.btn:focus{
outline:none;
}
</style>
</head>

<body>

<a class="btn"
href="https://drive.google.com/file/d/1FwELaNAMR_X1gWVPH7Gm-H0EGY4YoCGH/preview"
target="_blank">
Course Certificate
</a>

</body>
</html>
