<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#efefef;
font-family: Georgia, serif;
}

.btn{
display:inline-block;
width:175px;          /* shorter width */
height:34px;          /* smaller height */
line-height:34px;
text-align:center;
background:#2f6fc0;
color:white;
text-decoration:none;
font-size:14px;       /* smaller text */
border-radius:6px;
cursor:pointer;
user-select:none;
border:none;
outline:none;
}

/* no hover effect */
.btn:hover,
.btn:active,
.btn:focus{
background:#2f6fc0;
color:white;
transform:none;
box-shadow:none;
outline:none;
}
</style>
</head>

<body>

<a class="btn"
href="https://drive.google.com/file/d/1FwELaNAMR_X1gWVPH7Gm-H0EGY4YoCGH/preview"
target="_blank">
Course Certificate
</a>

</body>
</html>
